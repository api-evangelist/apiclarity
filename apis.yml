apis:
  - aid: apiclarity:apiclarity-api
    name: APIClarity API
    description: >-
      The APIClarity API provides programmatic access to API traffic analysis,
      reconstructed OpenAPI specifications, API inventory, and security findings.
      It allows users to query discovered APIs, review spec diffs between
      observed and documented API behavior, and manage API security alerts.
