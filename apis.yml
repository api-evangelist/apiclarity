aid: apiclarity
name: APIClarity
description: >-
  APIClarity is an open source API security and observability tool that analyzes
  API traffic to reconstruct OpenAPI specifications, detect shadow and zombie
  APIs, identify API differences and changes, and provide API security alerts.
  It is part of the OpenClarity project and works with Kubernetes service meshes
  and API gateways for cloud-native API traffic observability.
type: Index
